<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRIS Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sidebar { background: linear-gradient(180deg, #4f46e5 0%, #3730a3 100%); }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <div class="min-h-screen flex flex-col md:flex-row">
        <!-- Sidebar -->
        <aside class="sidebar w-full md:w-64 text-white p-6 md:min-h-screen flex flex-col">
            <!-- Header & Nav -->
            <div class="flex-grow">
                <h1 class="text-2xl font-bold mb-10 flex flex-col gap-1">
                    <div class="flex items-center gap-2 mb-4">
                        <span class="bg-white text-indigo-700 px-2 py-1 rounded">HRIS</span>
                    </div>
                    
                    <!-- Urutan: Welcome, Nama, Jabatan -->
                    <div class="leading-tight w-full overflow-hidden">
                        <p class="text-xl font-bold text-white mb-1">Welcome</p> <!-- Welcome paling besar -->
                        <p id="displayNama" class="text-base font-semibold uppercase truncate block"></p> <!-- h4 size -->
                        <p id="displayJabatan" class="text-base font-medium text-indigo-200 uppercase truncate block"></p> <!-- h4 size -->
                    </div>
                </h1>
                
                <!-- Tambahkan mb-8 untuk memberi jarak bawah pada nav -->
                <nav class="space-y-4 mb-8">
                    <a href="#" class="block p-3 bg-white/20 rounded-lg">dashboard</a>
                    <!-- <a href="#" class="block p-3 hover:bg-white/10 rounded-lg">karyawan</a>
                    <a href="#" class="block p-3 hover:bg-white/10 rounded-lg">presensi</a>
                    <a href="#" class="block p-3 hover:bg-white/10 rounded-lg">pengaturan</a> -->
                </nav>
            </div>

            <!-- Tombol Logout -->
            <button onclick="confirmLogout()" 
                class="flex items-center justify-center gap-2 p-3 w-full bg-red-500 hover:bg-red-600 text-white font-medium rounded-lg transition-all duration-200 shadow-md hover:shadow-lg active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Logout
            </button>
        </aside>

    
        <!-- Main Content -->
        <main class="flex-1 p-4 md:p-10 bg-gray-50">
            <!-- Header -->
            <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h2 class="text-3xl font-extrabold text-gray-800">Dashboard Presensi</h2>
                    <p class="text-gray-500">Kelola kehadiran harian Anda dengan satu klik.</p>
                </div>
                <div class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded-full text-sm font-semibold">
                    <span id="dateDisplay"></span>
                </div>
            </header>

            <!-- Stats Grid -->
            <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                    <p class="text-sm font-medium text-gray-400 uppercase tracking-wider">Hadir</p>
                    <h3 class="text-3xl font-bold text-gray-800 mt-2">0</h3>
                </div>
                <!-- Tambahkan card lain di sini jika diperlukan -->
            </section>

            <!-- Absensi Section -->
            <section class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-gray-100">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-xl font-bold text-gray-800">Ambil Foto</h3>
                    
                    <!-- Div pembungkus dibuat justify-end agar tombol selalu di kanan -->
                    <div class="flex items-center gap-4 justify-end flex-1"> 
                        <span class="text-sm font-medium">Kamera:</span>
                        
                        <!-- Tombol Toggle -->
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="toggleKamera" class="sr-only peer">
                            <div class="group peer ring-0 bg-red-500 rounded-full outline-none duration-300 after:duration-300 
                                        w-16 h-8 shadow-md peer-checked:bg-emerald-500 peer-focus:outline-none 
                                        after:content-['✖️'] after:rounded-full after:absolute after:bg-gray-50 after:outline-none 
                                        after:h-6 after:w-6 after:top-1 after:left-1 after:-rotate-180 after:flex after:justify-center after:items-center 
                                        peer-checked:after:translate-x-8 peer-checked:after:content-['✔️'] peer-hover:after:scale-95 peer-checked:after:rotate-0">
                            </div>
                        </label>
                    </div>
                </div>
                
                <div class="flex flex-col lg:flex-row gap-8">
                    <!-- Video Container -->
                    <div class="flex-1">
                        <div class="relative overflow-hidden rounded-2xl bg-gray-900 aspect-video lg:aspect-[16/9]">
                            <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
                            <div id="overlay" class="absolute inset-0 border-4 border-indigo-500/30 rounded-2xl"></div>
                        </div>
                    </div>
                    
                    <!-- Controls -->
                    <div class="lg:w-1/3 flex flex-col justify-center gap-4">
                        <button id="snap" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transform active:scale-95 transition-all shadow-lg shadow-indigo-200">
                            Ambil Foto & Absen
                        </button>
                        <div id="status" class="text-center text-sm text-gray-500 bg-gray-50 p-4 rounded-xl border border-gray-100 italic">
                            menunggu akses kamera...
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/login.js"></script>
</body>
</html>

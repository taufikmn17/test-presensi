<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Reset Password</title>
    <!-- CSS terpisah agar aman dan rapi -->
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="icon" type="image/png" href="assets/icons/icons.png">
</head>
<body>

<div class="container">
    <div class="card">
        <!-- FRONT -->
        <div class="front" style="display: block;">
            <h2>Reset Password</h2>
            
            <form id="resetForm">
                <!-- STEP 1: INPUT EMAIL -->
                <div id="stepEmail">
                    <input type="email" id="resetEmail" placeholder="Masukkan Email Anda" required>
                    <button type="button" onclick="sendOTP()">Kirim Kode OTP</button>
                </div>

                <!-- STEP 2: INPUT OTP -->
                <div id="stepOTP" style="display:none;">
                    <input type="text" id="otpCode" placeholder="Masukkan 6 Digit OTP" required>
                    <button type="button" onclick="verifyOTP()">Verifikasi OTP</button>
                </div>
            </form>

            <!-- Tombol Kembali -->
            <div style="text-align: center; margin-top: 20px;">
                <a href="index.html" style="font-size: 12px; color: #4f46e5; text-decoration: none;">Kembali ke Login</a>
            </div>
        </div>
    </div>
</div>

<script src="assets/js/reset.js"></script>
</body>
</html>
